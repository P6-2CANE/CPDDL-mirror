name: Run Benchmarks

on:
  push:
    branches:
      - main

jobs:
  compile: 
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Restore bin cache
        id: cache-bin
        uses: actions/cache@v4
        with:
          path: bin
          key: bin-${{ runner.os }}-${{ hashFiles('src/**', 'pddl/**', '*') }}

      - name: Copy makefile config
        if: steps.cache-bin.outputs.cache-hit != 'true'
        run: cp Makefile.config.tpl Makefile.config

      - name: Build binary
        if: steps.cache-bin.outputs.cache-hit != 'true'
        run: make bin

      - name: Upload compiled bin artifact
        uses: actions/upload-artifact@v4
        with:
          name: compiled-bin
          path: bin
          if-no-files-found: error

  benchmark:
    needs: compile
    runs-on: self-hosted
    steps:
        - uses: actions/checkout@v3

        - name: Download compiled bin artifact
          uses: actions/download-artifact@v4
          with:
            name: compiled-bin
            path: _compiled_bin

        - name: Replace bin directory with compiled artifact
          run: |
            rm -rf bin
            mv _compiled_bin bin
            chmod +x bin/* || true

        - name: Clone PDDL data repository
          run: |
            if [ ! -d "pddl-data" ]; then
              git clone https://gitlab.com/danfis/pddl-data
            fi

        - name: Set up Python
          uses: actions/setup-python@v4
          with:
            python-version: '3.10' 
          
        - name: Install dependencies
          run: |
            python -m pip install --upgrade pip
            pip install -r .github/scripts/requirements.txt

        - name: Run benchmarks
          env:
            DISCORD_INFO_WEBHOOK: ${{ secrets.DISCORD_INFO_WEBHOOK }}
            DISCORD_ALERT_WEBHOOK: ${{ secrets.DISCORD_ALERT_WEBHOOK }}
            DISCORD_OVERVIEW_WEBHOOK: ${{ secrets.DISCORD_OVERVIEW_WEBHOOK }}
            SLURM_PARTITION: l4
            BENCHY_TIME_LIMIT: "300"
            BENCHY_MEMORY_LIMIT: "8192"
            BENCHY_CPU_PER_TASK: "1"
          run: python3 .github/scripts/benchy.py --all

        - name: Clean up
          if: always()
          run: |
            echo "Cleaning up..."
            find "$GITHUB_WORKSPACE" -mindepth 1 -maxdepth 1 ! -name ".git" ! -name "pddl-data" -exec rm -rf {} +
