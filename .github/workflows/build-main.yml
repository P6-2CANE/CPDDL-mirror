name: Build-main

on:
    push:
        branches: [main]
    pull_request:
        branches: [main]
    workflow_dispatch:


# Create binary and create release from main branch with binaries
jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v3

            - name: Copy makefile config
              run: cp Makefile.config.tpl Makefile.config

            - name: Build binary
              run: make bin

            - name: Create Release
              id: create_release
              uses: actions/create-release@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                tag_name: v${{ github.run_number }}
                release_name: Release v${{ github.run_number }}
                body: "Release of version v${{ github.run_number }} with binaries."
                draft: false
                prerelease: false

            - name: Upload Release Assets
              uses: actions/upload-release-asset@v1
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                  upload_url: ${{ steps.create_release.outputs.upload_url }}
                  asset_path: ./bin/pddl
                  asset_name: pddl
                  asset_content_type: application/octet-stream

            - name: Upload Release Assets
              uses: actions/upload-release-asset@v1
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                upload_url: ${{ steps.create_release.outputs.upload_url }}
                asset_path: ./bin/pddl-fdr
                asset_name: pddle-fdr
                asset_content_type: application/octet-stream

            - name: Upload Release Assets
              uses: actions/upload-release-asset@v1
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                upload_url: ${{ steps.create_release.outputs.upload_url }}
                asset_path: ./bin/pddl-lplan
                asset_name: pddle-lplan
                asset_content_type: application/octet-stream

            - name: Upload Release Assets
              uses: actions/upload-release-asset@v1
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                upload_url: ${{ steps.create_release.outputs.upload_url }}
                asset_path: ./bin/pddl-pddl
                asset_name: pddl-pddl
                asset_content_type: application/octet-stream
                
            - name: Upload Release Assets
              uses: actions/upload-release-asset@v1
              env:
                GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
              with:
                upload_url: ${{ steps.create_release.outputs.upload_url }}
                asset_path: ./bin/pddl-symba
                asset_name: pddl-symba
                asset_content_type: application/octet-stream 


            